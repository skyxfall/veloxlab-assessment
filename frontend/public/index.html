<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FAFAFA" />
  <meta name="color-scheme" content="light" />

  <title>Catalog — Browse Items</title>
  <meta name="description" content="Browse and search a catalog of items by name, category, and price." />
  <meta name="application-name" content="Catalog" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="/" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Catalog" />
  <meta property="og:title" content="Catalog — Browse Items" />
  <meta property="og:description" content="Browse and search a catalog of items by name, category, and price." />
  <meta property="og:locale" content="en_US" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Catalog — Browse Items" />
  <meta name="twitter:description" content="Browse and search a catalog of items by name, category, and price." />

  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.webmanifest" />

  <link rel="preconnect" href="http://localhost:3001" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
  />

  <style>
    @font-face {
      font-family: 'Fraunces Fallback';
      src: local('Georgia'), local('Times New Roman'), local('serif');
      size-adjust: 104%;
      ascent-override: 93%;
      descent-override: 22%;
      line-gap-override: 0%;
    }
    @font-face {
      font-family: 'Inter Fallback';
      src: local('Helvetica Neue'), local('Arial'), local('sans-serif');
      size-adjust: 107%;
      ascent-override: 90%;
      descent-override: 22%;
      line-gap-override: 0%;
    }
  </style>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Catalog",
      "description": "Browse and search a catalog of items by name, category, and price.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
